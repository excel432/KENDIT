<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Vantage Trading Exchange</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: white;
      font-family: Arial, sans-serif;
    }
    nav {
      background: #111;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2a2a2a;
    }
    .logo {
      color: #c9a84c;
      font-size: 1.2rem;
      font-weight: bold;
    }
    .logout {
      background: transparent;
      border: 1px solid #c9a84c;
      color: #c9a84c;
      padding: 8px 16px;
      cursor: pointer;
      border-radius: 3px;
      font-size: 0.85rem;
    }
    .container {
      padding: 40px;
      max-width: 1000px;
      margin: 0 auto;
    }
    h1 {
      color: #c9a84c;
      margin-bottom: 10px;
      font-size: 1.8rem;
    }
    .welcome {
      color: #888;
      margin-bottom: 40px;
    }
    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: #161616;
      border: 1px solid #2a2a2a;
      padding: 25px;
      border-radius: 4px;
      flex: 1;
      min-width: 200px;
    }
    .stat-card h3 {
      color: #888;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }
    .stat-card p {
      color: #c9a84c;
      font-size: 1.8rem;
      font-weight: bold;
    }
    .payments-table {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      overflow: hidden;
    }
    .payments-table h2 {
      padding: 20px;
      color: #c9a84c;
      font-size: 1.1rem;
      border-bottom: 1px solid #2a2a2a;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      background: #111;
      padding: 12px 20px;
      text-align: left;
      font-size: 0.8rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    td {
      padding: 15px 20px;
      border-bottom: 1px solid #2a2a2a;
      font-size: 0.9rem;
    }
    .status-active {
      color: #4caf82;
      background: rgba(76,175,130,0.1);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
    }
    .status-pending {
      color: #c9a84c;
      background: rgba(201,168,76,0.1);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
    }
    .empty {
      padding: 40px;
      text-align: center;
      color: #888;
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo">Vantage Trading Exchange</div>
    <button class="logout" onclick="logoutUser()">Log Out</button>
  </nav>

  <div class="container">
    <h1>My Portfolio</h1>
    <p class="welcome" id="welcomeMsg">Welcome back!</p>

    <div class="stats">
      <div class="stat-card">
        <h3>Total Invested</h3>
        <p id="totalInvested">$0.00</p>
      </div>
      <div class="stat-card">
        <h3>Total Returns</h3>
        <p id="totalReturns">$0.00</p>
      </div>
      <div class="stat-card">
        <h3>Active Plans</h3>
        <p id="activePlans">0</p>
      </div>
    </div>

    <div class="payments-table">
      <h2>Payment History</h2>
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Amount</th>
            <th>Plan</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="paymentsBody">
          <tr>
            <td colspan="4" class="empty">
              No payments yet
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        document.getElementById('welcomeMsg').textContent = 'Welcome back, ' + user.email;
        loadPayments(user.uid);
      } else {
        window.location.href = 'login.html';
      }
    });

    async function loadPayments(uid) {
      const q = query(collection(db, 'payments'), where('userId', '==', uid));
      const querySnapshot = await getDocs(q);
      const tbody = document.getElementById('paymentsBody');

      if (querySnapshot.empty) return;

      tbody.innerHTML = '';
      let totalInvested = 0;
      let activePlans = 0;

      querySnapshot.forEach((doc) => {
        const data = doc.data();
        totalInvested += data.amount;
        if (data.status === 'active') activePlans++;

        tbody.innerHTML += `
          <tr>
            <td>${data.date}</td>
            <td>$${data.amount}</td>
            <td>${data.plan}</td>
            <td><span class="status-${data.status}">${data.status}</span></td>
          </tr>
        `;
      });

      document.getElementById('totalInvested').textContent = '$' + totalInvested.toFixed(2);
      document.getElementById('activePlans').textContent = activePlans;
    }

    window.logoutUser = function() {
      signOut(auth).then(() => {
        window.location.href = 'login.html';
      });
    }
  </script>
</body>
</html>
